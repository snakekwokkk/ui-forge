interface:
  display_name: "UIForge"
  short_description: "生成移动端 UI、写入 Figma，并通过截图标注继续修改"
  default_prompt: "使用 $ui-forge 锁定线框图的原始文案与结构，分析参考图的图文配对、素材类型、位置和视觉占比，为现有模块生成角色正确的透明或复合素材，验证三个移动端 UI 方向，再将选中方向同源写入 Figma。"
  brand_color: "#7C3AED"
  icon_small: "./assets/ui-forge-icon-400.png"
  icon_large: "./assets/ui-forge-logo-1024.png"
dependencies:
  tools:
    - type: "mcp"
      value: "figma"
      description: "用于将选中设计方向重建为可编辑 Figma 页面"
policy:
  allow_implicit_invocation: true
