interface:
  display_name: "UIForge"
  short_description: "生成移动端 UI、写入 Figma，并通过截图标注继续修改"
  default_prompt: "使用 $ui-forge 提取品牌基因，先识别参考图的摄影、3D、卡通、插画或混合素材语言，再生成同类型但内容原创的素材和移动端 UI，最后同源写入 Figma 并生成 Visual Review。"
  brand_color: "#7C3AED"
  icon_small: "./assets/ui-forge-icon-400.png"
  icon_large: "./assets/ui-forge-logo-1024.png"
dependencies:
  tools:
    - type: "mcp"
      value: "figma"
      description: "用于将选中设计方向重建为可编辑 Figma 页面"
policy:
  allow_implicit_invocation: true
